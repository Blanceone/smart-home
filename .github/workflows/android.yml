name: Build Android APK

on:
  push:
    branches:
      - main
    paths:
      - 'app/**'
  pull_request:
    branches:
      - main
    paths:
      - 'app/**'
  workflow_dispatch:

env:
  JAVA_VERSION: '17'
  GRADLE_VERSION: '8.2'

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: ${{ env.GRADLE_VERSION }}

      - name: Grant execute permission for gradlew
        working-directory: ./app
        run: chmod +x gradlew

      - name: Build Debug APK
        working-directory: ./app
        run: ./gradlew assembleDebug --stacktrace

      - name: Build Release APK
        working-directory: ./app
        run: ./gradlew assembleRelease --stacktrace

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: app/app/build/outputs/apk/release/*.apk
          retention-days: 30

      - name: Get version info
        id: version
        working-directory: ./app
        run: |
          VERSION_NAME=$(grep "versionName" app/build.gradle.kts | head -1 | sed 's/.*versionName = "\([^"]*\)".*/\1/')
          VERSION_CODE=$(grep "versionCode" app/build.gradle.kts | head -1 | sed 's/.*versionCode = \([0-9]*\).*/\1/')
          echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT
          echo "build_date=$(date +'%Y%m%d')" >> $GITHUB_OUTPUT

      - name: Rename APK files
        working-directory: ./app/app/build/outputs/apk
        run: |
          mv debug/*.apk debug/smarthome-debug-v${{ steps.version.outputs.version_name }}-${{ steps.version.outputs.build_date }}.apk || true
          mv release/*.apk release/smarthome-release-v${{ steps.version.outputs.version_name }}-${{ steps.version.outputs.build_date }}.apk || true

      - name: Create artifact summary
        run: |
          echo "## 📱 APK Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Type | Version | Build Date |" >> $GITHUB_STEP_SUMMARY
          echo "|------|---------|------------|" >> $GITHUB_STEP_SUMMARY
          echo "| Debug | ${{ steps.version.outputs.version_name }} | ${{ steps.version.outputs.build_date }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Release | ${{ steps.version.outputs.version_name }} | ${{ steps.version.outputs.build_date }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📥 Download" >> $GITHUB_STEP_SUMMARY
          echo "- Download from the **Artifacts** section below" >> $GITHUB_STEP_SUMMARY

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: ${{ env.GRADLE_VERSION }}

      - name: Grant execute permission for gradlew
        working-directory: ./app
        run: chmod +x gradlew

      - name: Run unit tests
        working-directory: ./app
        run: ./gradlew test --stacktrace

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: app/app/build/test-results/
          retention-days: 7
